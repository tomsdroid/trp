<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Profil - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-control[readonly] {
            background-color: transparent !important;
            padding-left: 0;
        }
    </style>
</head>
<body class="bg-light">
    <div id="app-container">
        
        <!-- Header Page -->
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm d-flex align-items-center position-sticky top-0 z-3">
            <a href="pengaturan.html" class="text-dark me-2 mt-1"><i class="bi bi-arrow-left fs-5"></i></a>
            <h5 class="fw-bold mb-0" style="color: #005a70;">Edit Profil Pribadi</h5>
        </div>

        <section class="pb-4 pt-3">
            <div class="container-fluid px-3">
                <div class="card border-0 shadow-sm rounded-3 mb-3">
                    <div class="card-body p-3">
                        
                        <!-- BAGIAN EDIT AVATAR -->
                        <div class="text-center mb-4 mt-1">
                            <div class="position-relative d-inline-block">
                                <div class="bg-white rounded-4 d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 85px; height: 85px; border: 1px solid #eee;">
                                    <i class="bi bi-person-fill" style="font-size: 3.8rem; color: #005a70;"></i>
                                </div>
                                <label for="uploadAvatar" class="position-absolute bottom-0 end-0 rounded-circle border border-2 border-white d-flex align-items-center justify-content-center shadow-sm" style="width: 28px; height: 28px; background-color: var(--wondr-orange); cursor: pointer; transform: translate(25%, 25%);">
                                    <i class="bi bi-camera-fill text-white" style="font-size: 0.75rem;"></i>
                                </label>
                                <input type="file" id="uploadAvatar" class="d-none" accept="image/png, image/jpeg, image/jpg">
                            </div>
                            <div class="mt-2 text-muted" style="font-size: 0.65rem;">Maks. 2MB (JPG/PNG)</div>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-0" style="font-size:0.7rem;">ID Terapis (Tidak dapat diubah)</label>
                                <input type="text" class="form-control form-control-sm border-0 fw-bold text-muted fs-6" value="TRP-9921" readonly>
                            </div>
                            
                            <hr class="text-muted opacity-25 my-2">

                            <div class="mb-3 mt-3">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Nama Lengkap</label>
                                <input type="text" class="form-control form-control-sm bg-light border-0 rounded-2" value="Dr. Sarah Wijaya">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Nomor Handphone</label>
                                <input type="tel" class="form-control form-control-sm bg-light border-0 rounded-2" value="081234567890">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Email</label>
                                <input type="email" class="form-control form-control-sm bg-light border-0 rounded-2" value="sarah.wijaya@theralog.com">
                            </div>
                            
                            <button type="button" class="btn w-100 rounded-pill py-2 fw-bold text-white shadow-sm" style="background-color: #005a70; font-size: 0.8rem;" onclick="alert('Profil berhasil diperbarui!'); window.location.href='pengaturan.html';">
                                Simpan Perubahan
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script>
        document.getElementById('uploadAvatar').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                alert('Foto "'+ file.name +'" siap diunggah saat Anda menyimpan perubahan.');
            }
        });
    </script>
</body>
</html>
