<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">
        
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm mb-3">
            <h5 class="fw-bold mb-0" style="color: #005a70;">Profil Akun</h5>
        </div>

        <section class="page-section pb-5 h-100">
            <div class="container-fluid px-3 text-center mt-4">
                <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center shadow-sm mb-3 position-relative" style="width: 90px; height: 90px;">
                    <i class="bi bi-person-fill" style="font-size: 3.5rem; color: #005a70;"></i>
                    <div class="position-absolute bottom-0 end-0 rounded-circle border border-2 border-white d-flex align-items-center justify-content-center" style="width: 28px; height: 28px; background-color: #f78c22;">
                        <i class="bi bi-pencil-fill text-white" style="font-size: 0.7rem;"></i>
                    </div>
                </div>
                <h5 class="fw-bold text-dark mb-0">Dr. Sarah Wijaya</h5>
                <p class="text-muted small">Terapis Senior</p>
            </div>

            <div class="container-fluid px-3 mt-4 mb-5">
                <h6 class="fw-bold text-muted small mb-2 ps-1">PENGATURAN</h6>
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="list-group list-group-flush rounded-4">
                        <a href="#" class="list-group-item p-3 d-flex align-items-center text-dark text-decoration-none border-bottom">
                            <div class="bg-light rounded p-2 me-3">
                                <i class="bi bi-person-gear text-dark"></i>
                            </div>
                            <span class="small fw-bold flex-grow-1">Edit Profil</span>
                            <i class="bi bi-chevron-right text-muted"></i>
                        </a>
                        <a href="#" class="list-group-item p-3 d-flex align-items-center text-dark text-decoration-none border-bottom">
                            <div class="bg-light rounded p-2 me-3">
                                <i class="bi bi-bell text-dark"></i>
                            </div>
                            <span class="small fw-bold flex-grow-1">Notifikasi</span>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" checked style="background-color: var(--wondr-cyan); border-color: var(--wondr-cyan);">
                            </div>
                        </a>
                        <a href="#" class="list-group-item p-3 d-flex align-items-center text-dark text-decoration-none">
                            <div class="bg-light rounded p-2 me-3">
                                <i class="bi bi-shield-lock text-dark"></i>
                            </div>
                            <span class="small fw-bold flex-grow-1">Ubah PIN</span>
                            <i class="bi bi-chevron-right text-muted"></i>
                        </a>
                    </div>
                </div>

                <button class="btn bg-white text-danger w-100 rounded-pill shadow-sm fw-bold py-3 mb-5" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i> Keluar
                </button>
            </div>
        </section>

        <!-- Bottom Navigation (Active = Profile) -->
        <nav id="bottom-nav" class="navbar fixed-bottom bg-white shadow-lg rounded-top-4">
            <div class="container-fluid justify-content-around px-2 py-2">
                <a href="home.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-house-door-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Beranda</span>
                </a>
                <a href="input.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-plus-square-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Input</span>
                </a>
                <a href="recap.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-pie-chart-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Rekap</span>
                </a>
                <a href="profile.html" class="nav-item text-decoration-none active">
                    <i class="bi bi-person-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Profil</span>
                </a>
            </div>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
