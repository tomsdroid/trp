<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Input Data - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">
        
        <!-- Header Page -->
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm d-flex align-items-center position-sticky top-0 z-3">
            <a href="index.html" class="text-dark me-2 mt-1"><i class="bi bi-arrow-left fs-5"></i></a>
            <h5 class="fw-bold mb-0" style="color: #005a70;">Input Data Terapis</h5>
        </div>

        <section class="pb-4 pt-3">
            <div class="container-fluid px-3">
                <div class="card border-0 shadow-sm rounded-3 mb-3">
                    <div class="card-body p-3">
                        <form id="logForm">
                            
                            <!-- ID Transaksi -->
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">ID Transaksi</label>
                                <input type="text" id="inputId" class="form-control form-control-sm border-0 rounded-2 fw-bold text-muted" readonly>
                            </div>

                            <!-- Cabang & Area -->
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Cabang</label>
                                    <div class="custom-select-wrapper standard-dropdown" id="dropdownCabang">
                                        <div class="custom-select-trigger form-control form-control-sm rounded-2">
                                            <span class="selected-text text-muted">-- Pilih --</span>
                                            <i class="bi bi-chevron-down text-muted" style="font-size: 0.7rem;"></i>
                                        </div>
                                        <div class="custom-options">
                                            <div class="custom-option" data-value="Amarta">Amarta</div>
                                            <div class="custom-option" data-value="Refleksi">Refleksi</div>
                                            <div class="custom-option" data-value="Rumah Spa">Rumah Spa</div>
                                        </div>
                                        <input type="hidden" name="cabang" required>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Area</label>
                                    <div class="custom-select-wrapper standard-dropdown" id="dropdownArea">
                                        <div class="custom-select-trigger form-control form-control-sm rounded-2">
                                            <span class="selected-text text-muted">-- Pilih --</span>
                                            <i class="bi bi-chevron-down text-muted" style="font-size: 0.7rem;"></i>
                                        </div>
                                        <div class="custom-options">
                                            <div class="custom-option" data-value="R.Sukamto">R.Sukamto</div>
                                            <div class="custom-option" data-value="Golf">Golf</div>
                                            <div class="custom-option" data-value="Demang">Demang</div>
                                            <div class="custom-option" data-value="Sukamaju">Sukamaju</div>
                                        </div>
                                        <input type="hidden" name="area" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Kategori -->
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Kategori</label>
                                <div class="custom-select-wrapper standard-dropdown" id="dropdownKategori">
                                    <div class="custom-select-trigger form-control form-control-sm rounded-2">
                                        <span class="selected-text text-muted">-- Pilih Kategori --</span>
                                        <i class="bi bi-chevron-down text-muted" style="font-size: 0.7rem;"></i>
                                    </div>
                                    <div class="custom-options">
                                        <div class="custom-option" data-value="R">Request</div>
                                        <div class="custom-option" data-value="U">Urutan</div>
                                        <div class="custom-option" data-value="PN">Permintaan Nama</div>
                                    </div>
                                    <input type="hidden" name="kategori" required>
                                </div>
                            </div>

                            <!-- Jenis Terapi -->
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Paket / Jenis Terapi</label>
                                <div class="custom-select-wrapper" id="dropdownTerapi">
                                    <div class="custom-select-trigger form-control form-control-sm rounded-2 bg-light">
                                        <span class="selected-text text-muted">Pilih cabang terlebih dahulu</span>
                                        <i class="bi bi-chevron-down text-muted" style="font-size: 0.7rem;"></i>
                                    </div>
                                    <div class="custom-options" id="terapiOptionsContainer"></div>
                                    <input type="hidden" name="jenis_terapi" required>
                                </div>
                            </div>
                            
                            <!-- Tanggal & Durasi -->
                            <div class="row g-2 mb-4">
                                <div class="col-7">
                                    <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Tanggal</label>
                                    <input type="date" id="inputDate" class="form-control form-control-sm border-0 rounded-2 text-muted fw-bold" readonly>
                                </div>
                                <div class="col-5">
                                    <label class="form-label fw-bold text-dark mb-1" style="font-size:0.75rem;">Durasi (Mnt)</label>
                                    <input type="text" id="inputDurasi" class="form-control form-control-sm border-0 rounded-2 text-muted fw-bold" placeholder="0" readonly>
                                </div>
                            </div>
                            
                            <button type="button" class="btn w-100 rounded-pill py-3 fw-bold text-white shadow-sm" style="background-color: #005a70; font-size: 0.85rem;" onclick="alert('Data Log Berhasil Disimpan!')">
                                Simpan Log Terapi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

            '35': { produk: 'Green Tea Spa', durasi: 150 },
            '36': { produk: 'Coffee Mud Spa', durasi: 150 },
            '37': { produk: 'Lavender Spa', durasi: 150 },
            '38': { produk: 'Relaxing Spa', durasi: 150 },
            '39': { produk: 'Chocolate Spa', durasi: 180 },
            '40': { produk: 'Kendedes Spa', durasi: 180 },

            '48': { produk: 'Putri Rambut Selako', durasi: 0 },
            '49': { produk: 'Putri Rambut Selako', durasi: 0 },
            '50': { produk: 'Putri Dayang Merindu', durasi: 0 },
            '51': { produk: 'Putri Dayang Merindu', durasi: 0 },
            '52': { produk: 'Putri Dayang Merindu', durasi: 0 },
            '53': { produk: 'Putri Kembang Dadar', durasi: 0 },
            '54': { produk: 'Putri Kembang Dadar', durasi: 0 },
            '55': { produk: 'Putri Kembang Dadar', durasi: 0 },
            '56': { produk: 'Putri Kembang Dadar', durasi: 0 },
            '57': { produk: 'Totok Wajah', durasi: 60 },
            '58': { produk: 'Masker Badan', durasi: 60 },
            '60': { produk: 'Massage + Totok Wajah', durasi: 90 },
            '61': { produk: 'Massage + Totok Wajah', durasi: 120 }
        };

        document.addEventListener("DOMContentLoaded", function() {
            
            const randomId = Math.floor(10000 + Math.random() * 90000);
            document.getElementById("inputId").value = "SVC-" + randomId;

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById("inputDate").value = `${yyyy}-${mm}-${dd}`;

            const dropdownTerapi = document.getElementById('dropdownTerapi');
            const triggerTerapi = dropdownTerapi.querySelector('.custom-select-trigger');
            const textTerapi = dropdownTerapi.querySelector('.selected-text');
            const inputTerapi = dropdownTerapi.querySelector('input[type="hidden"]');
            const optionsContainer = document.getElementById('terapiOptionsContainer');
            const inputDurasi = document.getElementById('inputDurasi');

            function updateTerapiOptions(cabang) {
                optionsContainer.innerHTML = ''; 
                textTerapi.textContent = '-- Pilih Paket Terapi --';
                textTerapi.classList.remove('text-dark', 'fw-bold');
                textTerapi.classList.add('text-muted');
                inputTerapi.value = '';
                inputDurasi.value = '';
                
                triggerTerapi.classList.remove('bg-light'); 

                const dataSumber = (cabang === 'Rumah Spa') ? layananRumahSpa : layananMap;

                for (const [kode, data] of Object.entries(dataSumber)) {
                    const div = document.createElement('div');
                    div.className = 'custom-option';
                    div.setAttribute('data-value', kode);
                    div.setAttribute('data-durasi', data.durasi);
                    
                    let text = `[${kode}] ${data.produk}`;
                    if(data.durasi > 0) text += ` (${data.durasi}m)`;
                    div.textContent = text;

                    div.addEventListener('click', function(e) {
                        textTerapi.textContent = text;
                        textTerapi.classList.remove('text-muted');
                        textTerapi.classList.add('text-dark', 'fw-bold');
                        inputTerapi.value = kode;
                        inputDurasi.value = data.durasi > 0 ? data.durasi : 0;
                        dropdownTerapi.classList.remove('open');
                        e.stopPropagation();
                    });

                    optionsContainer.appendChild(div);
                }
            }

            triggerTerapi.addEventListener('click', function(e) {
                if(optionsContainer.innerHTML === '') return;
                closeAllDropdowns(dropdownTerapi);
                dropdownTerapi.classList.toggle('open');
                e.stopPropagation();
            });

            const standardDropdowns = document.querySelectorAll('.standard-dropdown');
            standardDropdowns.forEach(dropdown => {
                const trigger = dropdown.querySelector('.custom-select-trigger');
                const options = dropdown.querySelectorAll('.custom-option');
                const hiddenInput = dropdown.querySelector('input[type="hidden"]');
                const selectedText = dropdown.querySelector('.selected-text');

                trigger.addEventListener('click', function(e) {
                    closeAllDropdowns(dropdown);
                    dropdown.classList.toggle('open');
                    e.stopPropagation();
                });

                options.forEach(option => {
                    option.addEventListener('click', function(e) {
                        const val = this.getAttribute('data-value');
                        const text = this.textContent; 
                        
                        selectedText.textContent = text;
                        selectedText.classList.remove('text-muted');
                        selectedText.classList.add('text-dark', 'fw-bold');
                        hiddenInput.value = val;

                        if(dropdown.id === 'dropdownCabang') {
                            updateTerapiOptions(val);
                        }

                        dropdown.classList.remove('open');
                        e.stopPropagation();
                    });
                });
            });

            function closeAllDropdowns(except = null) {
                const allDropdowns = document.querySelectorAll('.custom-select-wrapper');
                allDropdowns.forEach(d => {
                    if (d !== except) d.classList.remove('open');
                });
            }

            window.addEventListener('click', closeAllDropdowns);
        });
    </script>
</body>
</html>
