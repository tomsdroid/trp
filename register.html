<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Akun - TheraLog</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png">
    <style>
        :root { --wondr-blue: #005a70; --wondr-cyan: #76ded4; }
        body { background-color: #f8f9fa; }
        #app-container { max-width: 414px; min-height: 100vh; margin: 0 auto; background: #fff; padding: 25px; }
       .form-control,.form-select { border-radius: 12px; background: #f9fbfb; border: 1px solid #eee; padding: 12px; font-size: 0.9rem; }
       .form-select { font-weight: 600; }
       .btn-modern { height: 50px; border-radius: 15px; font-weight: 700; background: var(--wondr-blue); border: none; color: white; }
       .header-section { margin-bottom: 25px; }
       .avatar-upload { width: 100px; height: 100px; background: #f0f7f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; overflow: hidden; margin-bottom: 15px; border: 2px dashed #d1e2e6; }
       .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
       .avatar-upload i { color: var(--wondr-blue); font-size: 2rem; }
       .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body>
    <div id="app-container">

        <div class="header-section">
            <a href="login.html" class="text-decoration-none" style="color: var(--wondr-blue);"><i class="bi bi-arrow-left"></i> Kembali</a>
            <h4 class="fw-bold text-dark mt-3">Buat Akun Baru</h4>
            <p class="text-muted small">Lengkapi data diri untuk memulai.</p>
        </div>

        <form id="registerForm">
            <!-- Upload Avatar -->
            <div class="mt-4">
                <div class="avatar-upload" onclick="document.getElementById('fileInput').click()">
                    <img id="avatarPreview" src="#" style="display:none;">
                    <i id="avatarIcon" class="bi bi-camera-fill"></i>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(this)">
                <input type="hidden" id="avatarData" name="avatar">
                <p class="small text-muted mb-0">Upload Foto Profil (1:1)</p>
            </div>

            <div class="mb-3">
                <label class="small fw-bold text-muted">Nama Lengkap</label>
                <input type="text" id="inputNama" name="nama" class="form-control" placeholder="Dr. Sarah Wijaya" required>
            </div>

            <!-- Cabang & Area - UDAH PAKE SELECT BIASA -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold text-muted">Cabang</label>
                    <select id="inputCabang" name="cabang" class="form-select" required>
                        <option value="" selected disabled>-- Pilih Cabang --</option>
                        <option value="Amarta">Amarta</option>
                        <option value="Refleksi">Refleksi</option>
                        <option value="Rumah Spa">Rumah Spa</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">Area</label>
                    <select id="inputArea" name="area" class="form-select" required>
                        <option value="" selected disabled>-- Pilih Area --</option>
                        <option value="R.Sukamto">R.Sukamto</option>
                        <option value="Golf">Golf</option>
                        <option value="Demang">Demang</option>
                        <option value="Sukamaju">Sukamaju</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted">Buat PIN (6 Angka)</label>
                <input type="password" id="inputPin" name="pin" class="form-control" maxlength="6" pattern="[0-9]{6}" placeholder="••••••" inputmode="numeric" required>
            </div>

            <button type="submit" class="btn w-100 btn-modern shadow-sm">Daftar Sekarang</button>
        </form>
    </div>

    <div class="loading-overlay" id="loading"><div class="spinner-border text-white mb-2"></div><p>Menyimpan...</p></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script>
        let avatarBase64 = null;

        // Logika Avatar
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    avatarBase64 = e.target.result;
                    document.getElementById('avatarPreview').src = avatarBase64;
                    document.getElementById('avatarPreview').style.display = 'block';
                    document.getElementById('avatarIcon').style.display = 'none';
                    document.getElementById('avatarData').value = avatarBase64;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            // UDAH GA ADA LOGIKA DROPDOWN RIBET

            // LOGIKA SIMPAN KE INDEXEDDB
            document.getElementById('registerForm').addEventListener('submit', async function(e){
                e.preventDefault();
                if(!this.checkValidity()){ this.reportValidity(); return; }
                document.getElementById('loading').style.display = 'flex';

                const nama = document.getElementById('inputNama').value;
                const cabang = document.getElementById('inputCabang').value;
                const area = document.getElementById('inputArea').value;
                const pin = document.getElementById('inputPin').value;

                // Generate ID unik untuk terapis
                const userId = `TRP_${nama.toUpperCase().replace(/\s+/g, '_')}_${Date.now().toString().slice(-4)}`;

                const newTherapist = {
                    id: userId,
                    nama: nama,
                    cabang: cabang,
                    area: area,
                    pin: pin,
                    avatar: avatarBase64,
                    createdAt: new Date().getTime()
                };

                try {
                    await addTherapist(newTherapist);
                    alert('Registrasi Berhasil! Silakan Login');
                    window.location.href = 'login.html';
                } catch(err){
                    if(err.message.includes('already exists')){
                        alert('ID sudah terdaftar. Coba nama lain');
                    } else {
                        alert('Gagal daftar: ' + err.message);
                    }
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
