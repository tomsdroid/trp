<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Akun - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --wondr-blue: #005a70; --wondr-cyan: #76ded4; }
        body { background-color: #f8f9fa; }
        #app-container { 
            max-width: 414px; min-height: 100vh; margin: 0 auto; 
            background: #fff; padding: 25px;
        }
        .form-control { border-radius: 12px; background: #f9fbfb; border: 1px solid #eee; padding: 12px; }
        .btn-modern { 
            height: 50px; border-radius: 15px; font-weight: 700; 
            background: var(--wondr-blue); border: none; color: white;
        }
        .header-section { margin-bottom: 25px; }

        /* Avatar Upload */
        .avatar-upload {
            width: 100px; height: 100px; background: #f0f7f9;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; position: relative; cursor: pointer;
            overflow: hidden; margin-bottom: 15px; border: 2px dashed #d1e2e6;
        }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload i { color: var(--wondr-blue); font-size: 2rem; }

        /* Custom Dropdown Styling */
        .custom-select-wrapper { position: relative; cursor: pointer; }
        .custom-select-trigger { display: flex; align-items: center; justify-content: space-between; background: #f9fbfb; border: 1px solid #eee; padding: 12px; border-radius: 12px; font-size: 0.9rem; }
        .custom-options { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #eee; border-radius: 12px; z-index: 10; display: none; max-height: 200px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .custom-select-wrapper.open .custom-options { display: block; }
        .custom-option { padding: 12px; border-bottom: 1px solid #eee; }
        .custom-option:hover { background-color: #f0f7f9; }
    </style>
</head>
<body>
    <div id="app-container">
        
        <div class="header-section">
            <a href="login.html" class="text-decoration-none" style="color: var(--wondr-blue);"><i class="bi bi-arrow-left"></i> Kembali</a>
            

            <h4 class="fw-bold text-dark mt-3">Buat Akun Baru</h4>
            <p class="text-muted small">Lengkapi data diri untuk memulai.</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Registrasi Berhasil!'); window.location.href='login.html';">
            <!-- Upload Avatar -->
            <div class="mt-4">
                <div class="avatar-upload" onclick="document.getElementById('fileInput').click()">
                    <img id="avatarPreview" src="#" style="display:none;">
                    <i id="avatarIcon" class="bi bi-camera-fill"></i>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(this)">
                <p class="small text-muted mb-0">Upload Foto Profil (1:1)</p>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted">Nama Lengkap</label>
                <input type="text" class="form-control" placeholder="Dr. Sarah Wijaya" required>
            </div>

            <!-- Cabang & Area -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="small fw-bold text-muted">Cabang</label>
                    <div class="custom-select-wrapper standard-dropdown" id="dropdownCabang">
                        <div class="custom-select-trigger form-control">
                            <span class="selected-text text-muted">-- Pilih --</span>
                            <i class="bi bi-chevron-down"></i>
                        </div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="Amarta">Amarta</div>
                            <div class="custom-option" data-value="Refleksi">Refleksi</div>
                            <div class="custom-option" data-value="Rumah Spa">Rumah Spa</div>
                        </div>
                        <input type="hidden" name="cabang" required>
                    </div>
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">Area</label>
                    <div class="custom-select-wrapper standard-dropdown" id="dropdownArea">
                        <div class="custom-select-trigger form-control">
                            <span class="selected-text text-muted">-- Pilih --</span>
                            <i class="bi bi-chevron-down"></i>
                        </div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="R.Sukamto">R.Sukamto</div>
                            <div class="custom-option" data-value="Golf">Golf</div>
                            <div class="custom-option" data-value="Demang">Demang</div>
                        </div>
                        <input type="hidden" name="area" required>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted">Buat PIN (6 Angka)</label>
                <input type="password" class="form-control" maxlength="6" placeholder="••••••" required>
            </div>

            <button type="submit" class="btn w-100 btn-modern shadow-sm">
                Daftar Sekarang
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Logika Avatar
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                    document.getElementById('avatarPreview').style.display = 'block';
                    document.getElementById('avatarIcon').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Logika Dropdown
        document.addEventListener("DOMContentLoaded", function() {
            const standardDropdowns = document.querySelectorAll('.standard-dropdown');
            standardDropdowns.forEach(dropdown => {
                const trigger = dropdown.querySelector('.custom-select-trigger');
                const options = dropdown.querySelectorAll('.custom-option');
                const hiddenInput = dropdown.querySelector('input[type="hidden"]');
                const selectedText = dropdown.querySelector('.selected-text');

                trigger.addEventListener('click', function(e) {
                    closeAllDropdowns(dropdown);
                    dropdown.classList.toggle('open');
                    e.stopPropagation();
                });

                options.forEach(option => {
                    option.addEventListener('click', function(e) {
                        selectedText.textContent = this.textContent;
                        selectedText.classList.remove('text-muted');
                        selectedText.classList.add('text-dark', 'fw-bold');
                        hiddenInput.value = this.getAttribute('data-value');
                        dropdown.classList.remove('open');
                        e.stopPropagation();
                    });
                });
            });

            function closeAllDropdowns(except = null) {
                document.querySelectorAll('.custom-select-wrapper').forEach(d => {
                    if (d !== except) d.classList.remove('open');
                });
            }
            window.addEventListener('click', closeAllDropdowns);
        });
    </script>
</body>
</html>
