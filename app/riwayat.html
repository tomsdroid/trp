<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riwayat - TheraLog</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png">
    <style>
        
       .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }

       .filter-sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); transition: bottom 0.3s ease-in-out; z-index: 1050; max-height: 80vh; overflow-y: auto; }
       .filter-sheet.active { bottom: 0; }
       .filter-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index: 1049; display: none; }
       .filter-overlay.active { display: block; }
       .filter-handle { width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: 10px auto; }
       .filter-option.active { background-color: #005a70!important; color: white!important; border-color: #005a70!important; }
    </style>
</head>
<body class="bg-light">
    <div id="app-container">

        <div class="bg-white pt-4 pb-3 px-3 shadow-sm mb-2 position-sticky top-0 z-3">
            <h5 class="fw-bold mb-0" style="color: #005a70;">Riwayat Sesi</h5>
        </div>

        <section class="pb-5 pt-2">
            <div class="container-fluid px-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="judulBulan" class="fw-bold text-dark mb-0" style="font-size:0.8rem;">Semua Riwayat</span>
                    <span id="btnFilter" class="badge bg-light text-dark border px-2 py-1" style="cursor:pointer;"><i class="bi bi-filter me-1"></i>Filter</span>
                </div>

                <div class="card border-0 shadow-sm rounded-3 mb-5">
                    <div id="listRiwayat" class="list-group list-group-flush rounded-3">
                        <div class="list-group-item text-center text-muted p-4" style="font-size:0.75rem;">
                            <div class="spinner-border spinner-border-sm mb-2" role="status"></div><br>
                            Memuat data...
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <nav id="bottom-nav" class="navbar fixed-bottom bg-white shadow-lg rounded-top-3">
            <div class="container-fluid justify-content-around px-2">
                <a href="/app/index.html" class="nav-item text-decoration-none text-muted"><i class="bi bi-house-door-fill fs-5 d-block text-center"></i><span class="nav-label">Beranda</span></a>
                <a href="/app/riwayat.html" class="nav-item text-decoration-none active"><i class="bi bi-clock-history fs-5 d-block text-center"></i><span class="nav-label">Riwayat</span></a>
                <a href="/app/recap.html" class="nav-item text-decoration-none text-muted"><i class="bi bi-pie-chart-fill fs-5 d-block text-center"></i><span class="nav-label">Rekap</span></a>
                <a href="/app/pengaturan.html" class="nav-item text-decoration-none text-muted"><i class="bi bi-gear-fill fs-5 d-block text-center"></i><span class="nav-label">Pengaturan</span></a>
            </div>
        </nav>
    </div>

    <!-- BOTTOMSHEET FILTER -->
    <div id="filterOverlay" class="filter-overlay"></div>
    <div id="filterSheet" class="filter-sheet">
        <div class="filter-handle"></div>
        <div class="p-3">
            <h6 class="fw-bold mb-3">Filter Riwayat</h6>

            <p class="fw-bold mb-2" style="font-size:0.75rem;">Periode</p>
            <div class="d-grid gap-2 mb-3" id="filterPeriode">
                <button class="btn btn-primary rounded-pill filter-option" data-type="periode" data-value="semua">Semua Riwayat</button>
                <button class="btn btn-outline-secondary rounded-pill filter-option" data-type="periode" data-value="bulan_ini">Bulan Ini (19 - 18)</button>
                <button class="btn btn-outline-secondary rounded-pill filter-option" data-type="periode" data-value="bulan_lalu">Bulan Lalu</button>
                <button class="btn btn-outline-secondary rounded-pill filter-option" data-type="periode" data-value="minggu_ini">Minggu Ini</button>
            </div>

            <p class="fw-bold mb-2" style="font-size:0.75rem;">Lokasi</p>
            <div class="d-flex flex-wrap gap-2 mb-3" id="filterLokasi"></div>

            <p class="fw-bold mb-2" style="font-size:0.75rem;">Produk</p>
            <div class="d-flex flex-wrap gap-2 mb-3" id="filterProduk"></div>

            <button id="btnResetFilter" class="btn btn-danger w-100 rounded-pill"><i class="bi bi-arrow-clockwise me-2"></i>Reset Filter</button>
        </div>
    </div>

    <div class="loading-overlay" id="loading"><div class="spinner-border text-white mb-2"></div><p>Memuat...</p></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
  <script src="js/script.js"></script>
    <script>
        let allSessions = [];
        let activeFilters = { periode: 'semua', lokasi: 'semua', produk: 'semua' };

        document.addEventListener("DOMContentLoaded", async function() {
            const userId = localStorage.getItem('current_user_id');
            if(!userId) { window.location.href = '/app/onboarding.html'; return; }

            await loadRiwayat(userId);

            document.getElementById('btnFilter').addEventListener('click', () => {
                document.getElementById('filterSheet').classList.add('active');
                document.getElementById('filterOverlay').classList.add('active');
            });
            document.getElementById('filterOverlay').addEventListener('click', () => {
                document.getElementById('filterSheet').classList.remove('active');
                document.getElementById('filterOverlay').classList.remove('active');
            });

            // KLIK OPSI FILTER
            document.addEventListener('click', async (e) => {
                if(e.target.classList.contains('filter-option')){
                    const type = e.target.dataset.type;
                    const value = e.target.dataset.value;

                    activeFilters[type] = value;

                    // Update UI active
                    document.querySelectorAll(`[data-type="${type}"]`).forEach(b => {
                        b.classList.remove('btn-primary', 'text-white');
                        b.classList.add('btn-outline-secondary');
                    });
                    e.target.classList.add('btn-primary', 'text-white');
                    e.target.classList.remove('btn-outline-secondary');

                    await loadRiwayat(userId);
                }
            });

            document.getElementById('btnResetFilter').addEventListener('click', async () => {
                activeFilters = { periode: 'semua', lokasi: 'semua', produk: 'semua' };
                document.querySelectorAll('.filter-option').forEach(b => {
                    b.classList.remove('btn-primary', 'text-white');
                    b.classList.add('btn-outline-secondary');
                });
                document.querySelector('[data-type="periode"][data-value="semua"]').classList.add('btn-primary', 'text-white');
                document.querySelector('[data-type="lokasi"][data-value="semua"]').classList.add('btn-primary', 'text-white');
                document.querySelector('[data-type="produk"][data-value="semua"]').classList.add('btn-primary', 'text-white');
                await loadRiwayat(userId);
            });
        });

        async function loadRiwayat(userId) {
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
            const listContainer = document.getElementById('listRiwayat');
            document.getElementById('loading').style.display = 'flex';

            try {
                if(allSessions.length === 0){
                    allSessions = await getSessionsByTherapist(userId);
                    allSessions.sort((a,b) => b.timestamp - a.timestamp);
                    populateFilterOptions(); // Isi tombol lokasi & produk
                }

                let filteredSessions = [...allSessions];

                // 1. FILTER PERIODE
                if(activeFilters.periode!== 'semua'){
                    const now = new Date();
                    if(activeFilters.periode === 'bulan_ini'){
                        const day = now.getDate();
                        let startMonth = now.getMonth(); let startYear = now.getFullYear();
                        let endMonth = now.getMonth(); let endYear = now.getFullYear();
                        if (day <= 18) { startMonth -= 1; if (startMonth < 0) { startMonth = 11; startYear -= 1; } }
                        else { endMonth += 1; if (endMonth > 11) { endMonth = 0; endYear += 1; } }
                        const startDate = new Date(startYear, startMonth, 19).getTime();
                        const endDate = new Date(endYear, endMonth, 18, 23, 59, 59).getTime();
                        filteredSessions = filteredSessions.filter(s => s.timestamp >= startDate && s.timestamp <= endDate);
                    } else if(activeFilters.periode === 'bulan_lalu'){
                        let startMonth = now.getMonth() - 1; let startYear = now.getFullYear();
                        let endMonth = now.getMonth() - 1; let endYear = now.getFullYear();
                        if (startMonth < 0) { startMonth = 11; startYear -= 1; }
                        const startDate = new Date(startYear, startMonth, 19).getTime();
                        const endDate = new Date(endYear, endMonth, 18, 23, 59, 59).getTime();
                        filteredSessions = filteredSessions.filter(s => s.timestamp >= startDate && s.timestamp <= endDate);
                    } else if(activeFilters.periode === 'minggu_ini'){
                        const firstDay = new Date(now); firstDay.setDate(now.getDate() - now.getDay()); firstDay.setHours(0,0,0,0);
                        const lastDay = new Date(firstDay); lastDay.setDate(firstDay.getDate() + 6); lastDay.setHours(23,59,59,999);
                        filteredSessions = filteredSessions.filter(s => s.timestamp >= firstDay.getTime() && s.timestamp <= lastDay.getTime());
                    }
                }

                // 2. FILTER LOKASI
                if(activeFilters.lokasi!== 'semua'){
                    filteredSessions = filteredSessions.filter(s => s.lokasi === activeFilters.lokasi);
                }

                // 3. FILTER PRODUK
                if(activeFilters.produk!== 'semua'){
                    filteredSessions = filteredSessions.filter(s => s.produk === activeFilters.produk);
                }

                // RENDER LIST
                if(filteredSessions.length === 0){
                    listContainer.innerHTML = `<div class="list-group-item text-center text-muted p-4" style="font-size:0.75rem;">Tidak ada data</div>`;
                } else {
                    let html = '';
                    filteredSessions.forEach(s => {
                        const tgl = new Date(s.timestamp);
                        const hari = tgl.getDate().toString().padStart(2, '0');
                        const bulan = monthNames[tgl.getMonth()];
                        html += `<div class="list-group-item p-2 px-3 d-flex justify-content-between align-items-center"><div class="d-flex align-items-center"><div class="bg-light rounded p-1 me-2 text-center" style="width: 35px; height: 35px;"><span class="fw-bold d-block" style="font-size: 0.65rem; color: #005a70; line-height: 1;">${hari}</span><span class="d-block text-muted" style="font-size: 0.55rem;">${bulan}</span></div><div><div class="mb-0 fw-bold text-dark" style="font-size:0.75rem;">${s.produk}</div><div class="text-muted" style="font-size: 0.65rem;">${s.lokasi} • ${s.kategori} • ${s.durasi} Menit</div></div></div><i class="bi bi-check-circle-fill text-success" style="font-size:0.8rem;"></i></div>`;
                    });
                    listContainer.innerHTML = html;
                }

                let judul = "Filter Aktif";
                if(activeFilters.periode === 'semua' && activeFilters.lokasi === 'semua' && activeFilters.produk === 'semua') judul = "Semua Riwayat";
                document.getElementById('judulBulan').innerText = `${judul} • ${filteredSessions.length} Sesi`;

            } catch(err) {
                console.error(err);
                listContainer.innerHTML = `<div class="list-group-item text-center text-danger p-4" style="font-size:0.75rem;">Gagal memuat data: ${err.message}</div>`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // OTOMATIS BUAT TOMBOL LOKASI & PRODUK DARI DATA
        function populateFilterOptions(){
            const lokasiContainer = document.getElementById('filterLokasi');
            const produkContainer = document.getElementById('filterProduk');
            const lokasiUnik = [...new Set(allSessions.map(s => s.lokasi))];
            const produkUnik = [...new Set(allSessions.map(s => s.produk))];

            lokasiContainer.innerHTML = `<button class="btn btn-primary btn-sm rounded-pill filter-option" data-type="lokasi" data-value="semua">Semua</button>`;
            lokasiUnik.forEach(l => {
                lokasiContainer.innerHTML += `<button class="btn btn-outline-secondary btn-sm rounded-pill filter-option" data-type="lokasi" data-value="${l}">${l}</button>`;
            });

            produkContainer.innerHTML = `<button class="btn btn-primary btn-sm rounded-pill filter-option" data-type="produk" data-value="semua">Semua</button>`;
            produkUnik.forEach(p => {
                produkContainer.innerHTML += `<button class="btn btn-outline-secondary btn-sm rounded-pill filter-option" data-type="produk" data-value="${p}">${p}</button>`;
            });
        }
    </script>
</body>
</html>
