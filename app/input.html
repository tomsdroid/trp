<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Input Data - TheraLog</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png">
    <style>
     .form-select-sm { font-size: 0.8rem; font-weight: 600; }
     .form-label { font-size:0.75rem; }
     .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">

        <div class="bg-white pt-4 pb-3 px-3 shadow-sm d-flex align-items-center position-sticky top-0 z-3">
            <a href="./index.html" class="text-dark me-2 mt-1"><i class="bi bi-arrow-left fs-5"></i></a>
            <h5 class="fw-bold mb-0" style="color: #005a70;">Input Data Terapis</h5>
        </div>

        <section class="pb-4 pt-3">
            <div class="container-fluid px-3">
                <div class="card border-0 shadow-sm rounded-3 mb-3">
                    <div class="card-body p-3">
                        <form id="logForm">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1">ID Transaksi</label>
                                <input type="text" id="inputId" class="form-control form-control-sm border-0 rounded-2 fw-bold bg-light" readonly>
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label fw-bold text-dark mb-1">Cabang</label>
                                    <select id="selectCabang" class="form-select form-select-sm rounded-2" required>
                                        <option value="" selected disabled>-- Pilih --</option>
                                        <option value="Amarta">Amarta</option>
                                        <option value="Refleksi">Refleksi</option>
                                        <option value="Rumah Spa">Rumah Spa</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold text-dark mb-1">Area</label>
                                    <select id="selectArea" class="form-select form-select-sm rounded-2" required>
                                        <option value="" selected disabled>-- Pilih --</option>
                                        <option value="Merdeka">Merdeka</option>
                                        <option value="Demang">Demang</option>
                                        <option value="Golf">Golf</option>
                                        <option value="Sudirman">Sudirman</option>
                                        <option value="R.Sukamto">R.Sukamto</option>
                                        <option value="Kapri">Kapri</option>
                                        <option value="Rajawali">Rajawali</option>
                                        <option value="Plaju">Plaju</option>
                                        <option value="Kertapati">Kertapati</option>
                                        <option value="Sukamaju">Sukamaju</option>
                                        <option value="CGC">CGC</option>
                                        <option value="Yorlan">Yorlan</option>
                                        <option value="Kartini">Kartini</option>
                                        <option value="Celentang">Celentang</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1">Kategori</label>
                                <select id="selectKategori" class="form-select form-select-sm rounded-2" required>
                                    <option value="" selected disabled>-- Pilih Kategori --</option>
                                    <option value="Request">Request</option>
                                    <option value="Urutan">Urutan</option>
                                    <option value="Permintaan Nama">Permintaan Nama</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark mb-1">Paket / Jenis Terapi</label>
                                <select id="selectTerapi" class="form-select form-select-sm rounded-2 bg-light" required disabled>
                                    <option value="">Pilih cabang terlebih dahulu</option>
                                </select>
                            </div>

                            <div class="row g-2 mb-4">
                                <div class="col-7">
                                    <label class="form-label fw-bold text-dark mb-1">Tanggal</label>
                                    <input type="date" id="inputDate" class="form-control form-control-sm border-0 rounded-2 fw-bold bg-light" readonly>
                                </div>
                                <div class="col-5">
                                    <label class="form-label fw-bold text-dark mb-1">Durasi (Mnt)</label>
                                    <input type="text" id="inputDurasi" class="form-control form-control-sm border-0 rounded-2 fw-bold bg-light" placeholder="0" readonly>
                                </div>
                            </div>

                            <button type="submit" class="btn w-100 rounded-pill py-3 fw-bold text-white shadow-sm" style="background-color: #005a70; font-size: 0.85rem;">
                                Simpan Log Terapi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="customToast" class="position-fixed p-3 bottom-0 end-0" style="z-index: 9999; display: none; padding-bottom: 80px !important;">
        <div class="toast show align-items-center text-white border-0 shadow-lg" style="background-color: #005a70; border-radius: 12px;" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center">
                    <i id="toastIcon" class="bi bi-check-circle-fill me-2 fs-5"></i>
                    <span id="toastMsg" style="font-size: 0.8rem; font-weight: 600;">Pesan di sini</span>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading"><div class="spinner-border text-white mb-2"></div><p>Menyimpan...</p></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/script.js"></script> <script type="module">
    import { layananMap, layananRumahSpa } from './js/layanan.js'; // IMPORT DATA

    document.addEventListener("DOMContentLoaded", function() {
        const userId = localStorage.getItem('current_user_id');
        if(!userId) { window.location.href = './onboarding.html'; return; }

        const inputId = document.getElementById("inputId");
        const inputDate = document.getElementById("inputDate");
        const selectCabang = document.getElementById('selectCabang');
        const selectArea = document.getElementById('selectArea');
        const selectTerapi = document.getElementById('selectTerapi');
        const inputDurasi = document.getElementById('inputDurasi');
        const logForm = document.getElementById('logForm');

        // 1. Eksekusi ID dan Tanggal secara langsung tanpa menunggu apapun
        function generateNewId(){
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const randomNum = Math.floor(10000 + Math.random() * 90000);
            inputId.value = `SVC${yy}${mm}${dd}${randomNum}`;
        }

        function setDefaultValues() {
            inputDate.value = new Date().toISOString().split('T')[0];
            generateNewId();
        }
        
        setDefaultValues(); 

        // 2. Fungsi update opsi terapi
        function updateTerapiOptions(cabang) {
            selectTerapi.innerHTML = ''; inputDurasi.value = '';
            let dataSumber = {};
            if(cabang === 'Rumah Spa'){ dataSumber = layananRumahSpa; }
            else if(cabang === 'Amarta' || cabang === 'Refleksi'){ dataSumber = layananMap; }
            else { selectTerapi.disabled = true; selectTerapi.classList.add('bg-light'); selectTerapi.add(new Option('Pilih cabang terlebih dahulu', '', true, true)); return; }

            selectTerapi.disabled = false; selectTerapi.classList.remove('bg-light');
            selectTerapi.add(new Option('Pilih Paket Terapi', '', true, true));

            for (const [kode, data] of Object.entries(dataSumber)) {
                let text = `[${kode}] ${data.produk}`;
                if(data.durasi > 0) text += ` (${data.durasi}m)`;
                if(data.note) text += ` - ${data.note}`;
                const option = new Option(text, kode);
                option.dataset.produk = data.produk; option.dataset.durasi = data.durasi;
                selectTerapi.add(option);
            }
        }

        // 3. Tarik data terapis di latar belakang (Tidak memblokir ID & Tanggal)
        if (typeof getTherapist === 'function') {
            getTherapist(userId).then(currentUser => {
                if (currentUser) {
                    if (currentUser.branch) {
                        selectCabang.value = currentUser.branch;
                        updateTerapiOptions(currentUser.branch);
                    }
                    if (currentUser.area) {
                        selectArea.value = currentUser.area;
                    }
                }
            }).catch(err => console.error("Gagal memuat default cabang/area:", err));
        }

        selectCabang.addEventListener('change', function() { updateTerapiOptions(this.value); });
        selectTerapi.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            inputDurasi.value = selectedOption.dataset.durasi > 0? selectedOption.dataset.durasi : 0;
        });

        logForm.addEventListener('submit', async function(e){
            e.preventDefault();
            if(!this.checkValidity()){ this.reportValidity(); return; }
            document.getElementById('loading').style.display = 'flex';

            const cabang = selectCabang.value;
            const area = selectArea.value;
            const kategori = document.getElementById('selectKategori').value;
            const kode = selectTerapi.value;
            const selectedOption = selectTerapi.options[selectTerapi.selectedIndex];

            const newSession = {
                id: inputId.value,
                timestamp: new Date(inputDate.value).getTime(),
                produk: selectedOption.dataset.produk,
                kode: kode,
                kategori: kategori,
                lokasi: `${cabang} ${area}`,
                durasi: parseInt(selectedOption.dataset.durasi),
                therapistID: userId
            };

            try {
                await saveSessions([newSession]);
                localStorage.setItem('is_data_imported', 'true');

                // Tampilkan pesan sukses
                showToast(`Log berhasil disimpan! Mengalihkan...`, 'success');

                // Menunda perpindahan halaman selama 1,5 detik agar toast terbaca
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 1500);

            } catch(err){
                showToast('Gagal menyimpan: ' + err.message, 'error'); 
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });
    });
    </script>
</body>
</html>
