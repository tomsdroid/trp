<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubah PIN - TheraLog</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="favicon-96x96.png">
  <link rel="stylesheet" href="./css/style.css">
    <style>
        .letter-spacing-lg { letter-spacing: 0.8rem; font-size: 1.5rem !important; }
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body class="bg-light">
    <div id="app-container">
        
        <!-- Header Page -->
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm d-flex align-items-center position-sticky top-0 z-3">
            <a href="./pengaturan.html" class="text-dark me-2 mt-1"><i class="bi bi-arrow-left fs-5"></i></a>
            <h5 class="fw-bold mb-0" style="color: #005a70;">Ubah PIN</h5>
        </div>

        <section class="pb-4 pt-3">
            <div class="container-fluid px-3 text-center">
                
                <div class="mb-4 mt-2">
                    <i class="bi bi-shield-lock-fill" style="font-size: 3.5rem; color: #f78c22;"></i>
                    <h6 class="fw-bold mt-2">Keamanan Akun</h6>
                    <p class="text-muted" style="font-size: 0.75rem;">Pastikan PIN Anda tidak mudah ditebak dan jangan beritahu siapapun.</p>
                </div>

                <div class="card border-0 shadow-sm rounded-3 mb-3 text-start">
                    <div class="card-body p-3">
                        <form id="pinForm">
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Masukkan PIN Lama</label>
                                <input type="password" id="pinLama" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••" inputmode="numeric" required>
                            </div>

                            <hr class="text-muted opacity-25 my-3">

                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Buat PIN Baru</label>
                                <input type="password" id="pinBaru" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••" inputmode="numeric" required>
                            </div>

                            <div class="mb-4 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Konfirmasi PIN Baru</label>
                                <input type="password" id="pinKonfirmasi" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••" inputmode="numeric" required>
                            </div>
                            
                            <button type="submit" id="btnSimpan" class="btn w-100 rounded-pill py-2 fw-bold text-white shadow-sm" style="background-color: #005a70; font-size: 0.8rem;">
                                Simpan PIN Baru
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="loading-overlay" id="loading"><div class="spinner-border text-white mb-2"></div><p>Menyimpan...</p></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/db.js"></script>
    <script src="./js/script.js"></script> <!-- buat showToast -->
    <script>
        let currentUserData = null;
        const userId = localStorage.getItem('current_user_id');

        document.addEventListener("DOMContentLoaded", async () => {
            if(!userId){ window.location.href = './onboarding.html'; return; }
            currentUserData = await getTherapist(userId);
        });

        document.getElementById('pinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            const pinLama = document.getElementById('pinLama').value;
            const pinBaru = document.getElementById('pinBaru').value;
            const pinKonfirmasi = document.getElementById('pinKonfirmasi').value;

            // Validasi
            if(pinLama.length !== 6 || pinBaru.length !== 6 || pinKonfirmasi.length !== 6){
                showToast("PIN harus 6 digit", "error");
                return;
            }
            if(btoa(pinLama) !== currentUserData.pin){
                showToast("PIN lama salah", "error");
                document.getElementById('pinLama').value = "";
                document.getElementById('pinLama').focus();
                return;
            }
            if(pinBaru !== pinKonfirmasi){
                showToast("PIN baru tidak sama", "error");
                document.getElementById('pinKonfirmasi').value = "";
                document.getElementById('pinKonfirmasi').focus();
                return;
            }
            if(pinLama === pinBaru){
                showToast("PIN baru harus beda dengan PIN lama", "error");
                return;
            }

            btn.disabled = true; 
            document.getElementById('loading').style.display = 'flex';

            try {
                const updatedData = {
                    ...currentUserData,
                    pin: btoa(pinBaru), // simpan base64
                    updated_at: new Date().toISOString(),
                    _isDirty: true
                };
                await saveTherapist(updatedData);

                showToast("PIN berhasil diperbarui!", "success");
                setTimeout(() => {
                    window.location.href = './pengaturan.html';
                }, 1200);

            } catch(err) {
                showToast("Gagal menyimpan PIN: " + err.message, "error");
            } finally {
                btn.disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
