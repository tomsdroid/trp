<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#005a70">
    <title>Login - TheraLog</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="./favicon-96x96.png">
    <style>
        :root { --wondr-blue: #005a70; --wondr-cyan: #76ded4; }
        body { background: linear-gradient(135deg, #f0f7f9 0%, #e0eaf1 100%); min-height: 100vh; }
        
        #app-container { 
            max-width: 414px; min-height: 100vh; margin: 0 auto; 
            background: #fff; padding: 30px; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; overflow: hidden;
        }
        .login-card { background: #ffffff; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,90,112,0.08); }
        .pin-input { letter-spacing: 0.8rem; font-size: 1.8rem !important; text-align: center; border: 2px solid #f0f0f0; border-radius: 15px; padding: 12px; width: 100%; background: #f9fbfb; color: var(--wondr-blue); }
        .pin-input:focus { border-color: var(--wondr-cyan); background: #fff; outline: none; }
        .btn-modern { height: 50px; border-radius: 15px; font-weight: 700; background: linear-gradient(90deg, var(--wondr-blue) 0%, #0087a3 100%); border: none; color: white; }
        .btn-modern:disabled { opacity: 0.6; }
        .error-msg { color: #dc3545; font-size: 0.75rem; text-align: center; margin-top: 10px; display: none; }
        
        .bio-btn { background: #f0f7f9; color: var(--wondr-blue); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: none; }
        .bio-btn:active { transform: scale(0.95); }
    </style>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="app-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="mb-3"><i class="bi bi-lock-fill fs-1" style="color: var(--wondr-cyan);"></i></div>
                <h5 id="welcomeText" class="fw-bold text-dark">Memuat...</h5>
                <p class="text-muted small">Masukkan PIN untuk akses aman</p>
            </div>

            <div id="loadingBox" class="text-center mb-3">
                <div class="spinner-border spinner-border-sm" style="color: var(--wondr-blue);"></div>
                <p class="mt-2" style="font-size: 0.8rem;">Menyiapkan data...</p>
            </div>

            <form id="loginForm" style="display:none;">
                <div class="mb-2">
                    <input type="password" id="inputPIN" class="form-control pin-input" maxlength="6" placeholder="••••••" required autofocus inputmode="numeric">
                </div>
                <div id="errorMsg" class="error-msg">PIN salah. Coba lagi</div>
                <button type="submit" id="btnLogin" class="btn w-100 btn-modern shadow-sm mt-3">Masuk</button>
            </form>

            <div id="bioLoginSection" class="text-center mt-4" style="display: none;">
                <p class="text-muted" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05rem;">Atau gunakan</p>
                <button type="button" class="btn bio-btn shadow-sm mx-auto" onclick="triggerBiometricLogin()">
                    <i class="bi bi-fingerprint fs-2"></i>
                </button>
            </div>

            <div id="offlineAlert" class="alert alert-warning text-center mt-4 d-none mb-0" style="font-size:0.75rem;">
                <i class="bi bi-wifi-off"></i> Mode Offline. Data tersimpan di HP.
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/db.js"></script>
    <script src="./js/script.js"></script>
    <script>
        let currentUserData = null;
        const userId = localStorage.getItem('current_user_id');

        window.addEventListener('offline', () => document.getElementById('offlineAlert').classList.remove('d-none'));
        window.addEventListener('online', () => document.getElementById('offlineAlert').classList.add('d-none'));

        document.addEventListener("DOMContentLoaded", async () => {
            const isLoggedIn = localStorage.getItem('is_logged_in');

            if(!userId){ window.location.href = './onboarding.html'; return; }
            if(isLoggedIn === 'true'){ window.location.href = './index.html'; return; }

            try {
                await initDB(); 
                currentUserData = await getTherapist(userId);
                
                document.getElementById('welcomeText').innerText = `Halo, ${currentUserData.fullname}`;
                document.getElementById('loadingBox').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                
                if (localStorage.getItem(`bio_enabled_${userId}`) === 'true') {
                    document.getElementById('bioLoginSection').style.display = 'block';
                }

                document.getElementById('inputPIN').focus();
            } catch(err){ 
                showToast("Gagal memuat data", "error"); 
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const inputPIN = document.getElementById('inputPIN');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true; btn.innerText = "Memeriksa..."; errorMsg.style.display = 'none';
            try {
                if(btoa(inputPIN.value) === currentUserData.pin){
                    showToast("Login berhasil!", "success");
                    localStorage.setItem('is_logged_in', 'true');
                    setTimeout(() => {
                        window.location.href = './index.html';
                    }, 800); 
                } else {
                    errorMsg.style.display = 'block';
                    showToast("PIN salah", "error"); 
                    inputPIN.value = ""; inputPIN.focus();
                }
            } catch(err) { 
                showToast("Terjadi kesalahan", "error");
            } 
            finally { btn.disabled = false; btn.innerText = "Masuk"; }
        });

        function triggerBiometricLogin() {
            if (window.cordova && window.Fingerprint) {
                Fingerprint.isAvailable(
                    function() {
                        Fingerprint.show({
                            title: "Login Biometrik",
                            subtitle: "TheraLog App",
                            description: "Gunakan Sidik Jari / Face ID Anda",
                            fallbackButtonTitle: "Batal",
                            disableBackup: true
                        }, function() {
                            showToast("Login berhasil!", "success");
                            localStorage.setItem('is_logged_in', 'true');
                            setTimeout(() => { window.location.href = './index.html'; }, 800);
                        }, function() {
                            showToast("Autentikasi batal atau gagal", "error");
                        });
                    },
                    function() {
                        showToast("Sensor biometrik tidak tersedia", "error");
                    }
                );
            } else {
                showToast("Fitur Sidik Jari hanya berlaku untuk Aplikasi Android.", "warning");
            }
        }
    </script>
</body>
</html>
