name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**' 
      - 'cordova/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@12

    - name: Copy PWA to Cordova www
      run: |
        mkdir -p cordova/www
        rm -rf cordova/www/*
        cp -r app/* cordova/www/

    - name: Auto Versioning
      id: version
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        VERSION=$(echo $LAST_TAG | sed 's/v//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        PATCH=$((PATCH + 1))
        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Update version in config.xml
      run: |
        sed -i "s/version=\".*\"/version=\"${VERSION#v}\"/" cordova/config.xml
        sed -i "s/android-versionCode=\".*\"/android-versionCode=\"${GITHUB_RUN_NUMBER}\"/" cordova/config.xml
      env:
        VERSION: ${{ steps.version.outputs.version }}

    - name: Install Cordova deps
      working-directory: ./cordova
      run: |
        cordova platform rm android || true
        cordova platform add android@13
        cordova plugin add cordova-plugin-inappbrowser

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 -d > cordova/keystore.jks

    - name: Build Unsigned APK
      working-directory: ./cordova
      run: |
        # Cukup suruh Cordova rakit APK mentah (Unsigned)
        cordova build android --release -- --packageType=apk
          
    - name: Sign APK (Zipalign & Apksigner)
      env:
        STORE_PASS: ${{ secrets.STORE_PASS }}
        KEY_PASS: ${{ secrets.KEY_PASS }}
      run: |
        # 1. Cari file APK mentah
        APK_PATH=$(find cordova/platforms/android/app/build/outputs -name "*.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then echo "APK tidak ditemukan!"; exit 1; fi
        
        # 2. Ambil direktori Android Build Tools versi tertinggi
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        
        # 3. Zipalign (Wajib agar APK teroptimasi dan lolos Play Protect)
        $BUILD_TOOLS/zipalign -v -p 4 "$APK_PATH" aligned.apk
        
        # 4. Apksigner (Proses Tanda Tangan Digital yang sebenarnya)
        $BUILD_TOOLS/apksigner sign --ks cordova/keystore.jks \
          --ks-pass env:STORE_PASS \
          --key-pass env:KEY_PASS \
          --ks-key-alias theralog \
          --out TheraLog-${{ steps.version.outputs.version }}.apk aligned.apk
          
        # 5. Verifikasi apakah tanda tangan berhasil
        $BUILD_TOOLS/apksigner verify TheraLog-${{ steps.version.outputs.version }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body: |
          Build otomatis dari commit: ${{ github.sha }}
          Status Build: ${{ job.status }}
        files: TheraLog-${{ steps.version.outputs.version }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Kirim Notifikasi ke Telegram
      if: always()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        STATUS: ${{ job.status }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}
      run: |
        if [ -z "$TELEGRAM_TOKEN" ]; then echo "Token Telegram tidak ditemukan!"; exit 0; fi
        MESSAGE="🤖 *Notifikasi Build TheraLog*
        
        📦 *Status:* ${STATUS}
        👤 *Oleh:* ${{ github.actor }}
        📝 *Pesan:* ${COMMIT_MSG}
        🔗 *Link:* ${RELEASE_URL}"
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="${MESSAGE}" \
          -d parse_mode="Markdown"
