name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**' 
      - 'cordova/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@12

    - name: Copy PWA to Cordova www
      run: |
        rm -rf cordova/www/*
        cp -r app/* cordova/www/

    - name: Auto Versioning
      id: version
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        VERSION=$(echo $LAST_TAG | sed 's/v//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        PATCH=$((PATCH + 1))
        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Update version in config.xml
      run: |
        sed -i "s/version=\".*\"/version=\"${VERSION#v}\"/" cordova/config.xml
        sed -i "s/android-versionCode=\".*\"/android-versionCode=\"${GITHUB_RUN_NUMBER}\"/" cordova/config.xml
      env:
        VERSION: ${{ steps.version.outputs.version }}

    - name: Install Cordova deps
      working-directory: ./cordova
      run: |
        cordova platform rm android || true
        cordova platform add android@15
        cordova plugin add cordova-plugin-inappbrowser
        cordova plugin add cordova-plugin-splashscreen

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 -d > keystore.jks

    - name: Build Release APK
      working-directory: ./cordova
      env:
        STORE_PASS: ${{ secrets.STORE_PASS }}
        KEY_PASS: ${{ secrets.KEY_PASS }}
      run: |
        cordova build android --release \
          --keystore=keystore.jks \
          --storePassword=$STORE_PASS \
          --alias=theralogkey \
          --password=$KEY_PASS

    - name: Rename APK with version
      run: mv cordova/platforms/android/app/build/outputs/apk/release/app-release.apk TheraLog-${{ steps.version.outputs.version }}.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body: |
          Auto build dari commit: ${{ github.sha }}
          
          **Perubahan:**
          - Build otomatis dari folder /app
          
          Install file `TheraLog-${{ steps.version.outputs.version }}.apk` di bawah
        files: TheraLog-${{ steps.version.outputs.version }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}