<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beranda - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">
        <!-- Header -->
        <div class="text-white pt-4 pb-5 px-3 rounded-bottom-4" style="background: linear-gradient(135deg, #005a70 0%, #0087a3 100%);">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <p class="mb-0 small text-white-50">Selamat datang di TheraLog,</p>
                    <h5 class="fw-bold mb-0">Dr. Sarah Wijaya</h5>
                </div>
                <div class="bg-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 45px; height: 45px;">
                    <i class="bi bi-person-fill fs-4" style="color: #005a70;"></i>
                </div>
            </div>
        </div>

        <section class="page-section pb-5 pt-3">
            <div class="container-fluid px-3" style="margin-top: -30px;">
                <!-- Summary Card -->
                <div class="card border-0 shadow-sm rounded-4 mb-3">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="text-muted small fw-bold">Total Sesi Minggu Ini</span>
                            <i class="bi bi-calendar2-week" style="color: #f78c22;"></i>
                        </div>
                        <h3 class="fw-bold mb-1" style="color: #005a70;">24 Sesi</h3>
                        <p class="mb-0 small text-success"><i class="bi bi-arrow-up-short"></i> +12% dari minggu lalu</p>
                    </div>
                </div>

                <!-- Quick Action -->
                <h6 class="fw-bold text-dark mt-4 mb-2 small">Akses Cepat</h6>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <a href="input.html" class="btn btn-white bg-white shadow-sm w-100 rounded-4 py-3 text-center border-0 text-decoration-none">
                            <div class="rounded-circle d-inline-flex p-3 mb-2" style="background-color: var(--wondr-cyan);">
                                <i class="bi bi-pencil-square text-dark fs-5"></i>
                            </div>
                            <span class="small fw-bold d-block text-dark">Input Log</span>
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="recap.html" class="btn btn-white bg-white shadow-sm w-100 rounded-4 py-3 text-center border-0 text-decoration-none">
                            <div class="rounded-circle d-inline-flex p-3 mb-2" style="background-color: var(--wondr-yellow);">
                                <i class="bi bi-bar-chart-fill text-dark fs-5"></i>
                            </div>
                            <span class="small fw-bold d-block text-dark">Lihat Rekap</span>
                        </a>
                    </div>
                </div>

                <!-- Recent Logs -->
                <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
                    <h6 class="fw-bold text-dark mb-0 small">Log Terakhir</h6>
                    <span class="small fw-bold" style="color: #f78c22; font-size: 0.7rem;">Lihat Semua</span>
                </div>
                
                <div class="card border-0 shadow-sm rounded-4 mb-5">
                    <div class="list-group list-group-flush rounded-4">
                        <div class="list-group-item p-3 d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded p-2 me-3 text-center" style="width: 40px; height: 40px;">
                                    <span class="fw-bold d-block" style="font-size: 0.7rem; color: #005a70;">12</span>
                                    <span class="d-block text-muted" style="font-size: 0.6rem;">Jul</span>
                                </div>
                                <div>
                                    <h6 class="mb-0 small fw-bold text-dark">Terapi Wicara</h6>
                                    <small class="text-muted" style="font-size: 0.75rem;">Klien: Budi • 45 Menit</small>
                                </div>
                            </div>
                            <i class="bi bi-check-circle-fill text-success"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="navbar fixed-bottom bg-white shadow-lg rounded-top-4">
            <div class="container-fluid justify-content-around px-2 py-2">
                <a href="home.html" class="nav-item text-decoration-none active">
                    <i class="bi bi-house-door-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Beranda</span>
                </a>
                <a href="input.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-plus-square-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Input</span>
                </a>
                <a href="recap.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-pie-chart-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Rekap</span>
                </a>
                <a href="profile.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-person-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Profil</span>
                </a>
            </div>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
