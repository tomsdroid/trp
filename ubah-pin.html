<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubah PIN - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">
        
        <!-- Header Page -->
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm d-flex align-items-center position-sticky top-0 z-3">
            <a href="pengaturan.html" class="text-dark me-2 mt-1"><i class="bi bi-arrow-left fs-5"></i></a>
            <h5 class="fw-bold mb-0" style="color: #005a70;">Ubah PIN</h5>
        </div>

        <section class="pb-4 pt-3">
            <div class="container-fluid px-3 text-center">
                
                <div class="mb-4 mt-2">
                    <i class="bi bi-shield-lock-fill" style="font-size: 3.5rem; color: #f78c22;"></i>
                    <h6 class="fw-bold mt-2">Keamanan Akun</h6>
                    <p class="text-muted" style="font-size: 0.75rem;">Pastikan PIN Anda tidak mudah ditebak dan jangan beritahu siapapun.</p>
                </div>

                <div class="card border-0 shadow-sm rounded-3 mb-3 text-start">
                    <div class="card-body p-3">
                        <form>
                            
                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Masukkan PIN Lama</label>
                                <input type="password" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••">
                            </div>

                            <hr class="text-muted opacity-25 my-3">

                            <div class="mb-3 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Buat PIN Baru</label>
                                <input type="password" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••">
                            </div>

                            <div class="mb-4 text-center">
                                <label class="form-label fw-bold text-dark mb-2" style="font-size:0.75rem;">Konfirmasi PIN Baru</label>
                                <input type="password" class="form-control bg-light border-0 rounded-3 text-center letter-spacing-lg" maxlength="6" placeholder="••••••">
                            </div>
                            
                            <button type="button" class="btn w-100 rounded-pill py-2 fw-bold text-white shadow-sm" style="background-color: #005a70; font-size: 0.8rem;" onclick="alert('PIN Berhasil Diperbarui!'); window.location.href='pengaturan.html';">
                                Simpan PIN Baru
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
