<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --wondr-blue: #005a70; --wondr-cyan: #76ded4; }
        body { background: linear-gradient(135deg, #f0f7f9 0%, #e0eaf1 100%); min-height: 100vh; }
        
        #app-container { 
            max-width: 414px; min-height: 100vh; margin: 0 auto; 
            background: #fff; padding: 30px; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .login-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,90,112,0.08);
            border: 1px solid rgba(0,90,112,0.05);
        }

        .pin-input {
            letter-spacing: 0.8rem;
            font-size: 1.8rem !important;
            text-align: center;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 12px;
            width: 100%;
            background: #f9fbfb;
            color: var(--wondr-blue);
        }
        .pin-input:focus { border-color: var(--wondr-cyan); background: #fff; outline: none; }

        .btn-modern { 
            height: 50px; border-radius: 15px; font-weight: 700; 
            background: linear-gradient(90deg, var(--wondr-blue) 0%, #0087a3 100%);
            border: none; color: white;
        }

        .bio-btn {
            background: #f0f7f9; color: var(--wondr-blue);
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .bio-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-lock-fill fs-1" style="color: var(--wondr-cyan);"></i>
                </div>
                <h5 class="fw-bold text-dark">Selamat Datang</h5>
                <p class="text-muted small">Masukkan PIN untuk akses aman</p>
            </div>

            <form onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="mb-4">
                    <input type="password" class="form-control pin-input" maxlength="6" placeholder="••••••" required autofocus>
                </div>
                <button type="submit" class="btn w-100 btn-modern shadow-sm mb-3">
                    Masuk
                </button>
            </form>

            <div class="text-center">
                <p class="text-muted" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05rem;">Atau gunakan</p>
                <button type="button" class="btn bio-btn shadow-sm mx-auto" onclick="triggerBiometric()">
                    <i class="bi bi-fingerprint fs-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function triggerBiometric() {
            alert("Memindai sidik jari...");
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }
    </script>
</body>
</html>
