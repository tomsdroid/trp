<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap (Kosong) - TheraLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="app-container">
        
        <!-- Header -->
        <div class="bg-white pt-4 pb-3 px-3 shadow-sm mb-3">
            <h5 class="fw-bold mb-0" style="color: #005a70;">Statistik Rekap</h5>
        </div>

        <section class="page-section pb-5 h-100">
            <div class="container-fluid px-3 d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
                
                <!-- Ilustrasi Empty State -->
                <div class="bg-white rounded-circle shadow-sm d-flex align-items-center justify-content-center mb-4 position-relative" style="width: 120px; height: 120px;">
                    <i class="bi bi-pie-chart text-muted opacity-25" style="font-size: 4rem;"></i>
                    <!-- Badge seru kecil sebagai aksen -->
                    <div class="position-absolute bottom-0 end-0 rounded-circle border border-3 border-light d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; background-color: var(--wondr-cyan);">
                        <i class="bi bi-info-lg text-dark fw-bold"></i>
                    </div>
                </div>

                <!-- Teks Empty State -->
                <h5 class="fw-bold text-dark mb-2 text-center">Belum Ada Rekap Data</h5>
                <p class="text-muted small px-4 mb-4 text-center" style="line-height: 1.5;">
                    Statistik distribusi jenis terapi dan ringkasan sesi Anda akan muncul di sini setelah Anda menyimpan log pertama.
                </p>

                <!-- Tombol Call-to-Action -->
                <a href="input.html" class="btn w-75 rounded-pill py-3 fw-bold text-white shadow-sm text-decoration-none" style="background-color: #f78c22;">
                    <i class="bi bi-pencil-square me-2"></i> Mulai Input Log
                </a>

            </div>
        </section>

        <!-- Bottom Navigation (Active = Rekap) -->
        <nav id="bottom-nav" class="navbar fixed-bottom bg-white shadow-lg rounded-top-4">
            <div class="container-fluid justify-content-around px-2 py-2">
                <a href="home.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-house-door-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Beranda</span>
                </a>
                <a href="input.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-plus-square-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Input</span>
                </a>
                <a href="recap-empty.html" class="nav-item text-decoration-none active">
                    <i class="bi bi-pie-chart-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Rekap</span>
                </a>
                <a href="profile.html" class="nav-item text-decoration-none text-muted">
                    <i class="bi bi-person-fill fs-5 d-block mb-1"></i>
                    <span class="nav-label">Profil</span>
                </a>
            </div>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
